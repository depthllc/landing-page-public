<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&amp;display=swap');

      .logo-text {
        font-family: 'Comfortaa', sans-serif;
        font-weight: 700;
        font-size: 100px;
        fill: #2c3036;
        letter-spacing: -1px;
      }
    </style>

    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f2348" flood-opacity="0.12" />
    </filter>

    <filter id="markShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#123b84" flood-opacity="0.18" />
    </filter>

    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f4f7fb" />
    </linearGradient>

    <linearGradient id="bgGrad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#389DE4" />
      <stop offset="100%" stop-color="#0E4394" />
    </linearGradient>

    <linearGradient id="fgGrad" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#60C5F9" />
      <stop offset="100%" stop-color="#236DD6" />
    </linearGradient>
  </defs>

  <rect x="18" y="18" width="364" height="364" rx="70" fill="url(#tileGrad)" filter="url(#tileShadow)" />

  <g filter="url(#markShadow)" transform="translate(0 34)">
    <path
      fill="url(#bgGrad)"
      d="M 230 92.34
         A 65 65 0 1 0 240 198
         L 220 172
         A 30 30 0 1 1 230 150
         Z"
    />

    <path
      fill="url(#fgGrad)"
      d="M 230 24
         L 265 -1
         L 265 150
         A 65 65 0 0 1 180 212
         C 170 200, 175 185, 190 178.3
         A 30 30 0 0 0 230 150
         L 230 24
         Z"
    />
  </g>

  <text x="200" y="322" class="logo-text" text-anchor="middle">depth</text>
</svg>
